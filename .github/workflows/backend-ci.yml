name: Backend CI/CD - Spring Boot

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # Find the pom.xml automatically
      - name: Locate pom.xml
        id: find-pom
        run: |
          POM_PATH=$(find . -name "pom.xml" | head -n 1)
          echo "pom_path=$POM_PATH" >> $GITHUB_OUTPUT

      - name: Build with Maven
        run: mvn -f ${{ steps.find-pom.outputs.pom_path }} clean install -B

      - name: Run Tests
        run: mvn -f ${{ steps.find-pom.outputs.pom_path }} test -B

      # Optional: Archive the build artifacts (JAR/WAR)
      - name: Archive Artifacts
        if: success()
        uses: actions/upload-artifact@v3
        with:
          name: backend-artifacts
          path: ${{ steps.find-pom.outputs.pom_path }}/../target/*.jar
